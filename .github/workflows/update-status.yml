name: Update Status

on:
  schedule:
    # JST: 0:07 / 3:07 / 6:07 / 9:07 / 12:07 / 15:07 / 18:07 / 21:07
    # GitHub Actions cron is UTC.
    - cron: "7 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npm i playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Update status
        run: node auto/scripts/update-status.js

      - name: Commit status.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add auto/data/status.json
          git add auto/data/debug || true
          git commit -m "Update status" || echo "No changes"
          git push
