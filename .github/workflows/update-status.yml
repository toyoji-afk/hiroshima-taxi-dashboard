name: Update taxi dashboard status

on:
  workflow_dispatch:
  schedule:
    # JST 00:00 / 06:00 / 12:00 / 18:00
    # GitHub Actions cron is UTC, so this is JST-9.
    - cron: "0 0,3,6,9,12,15,21 * * *"

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright
        run: npm i playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Update status
        run: node auto/scripts/update-status.js

      - name: Commit status
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add auto/data/status.json
          git commit -m "Update dashboard status" || echo "No changes"
          git push
