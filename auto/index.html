<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>広島市タクシーダッシュボード</title>
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="manifest" href="../manifest.webmanifest">
  <style>
:root {
  color-scheme: dark;
  --bg: #07142a;
  --panel: #101f3d;
  --panel2: #13264b;
  --text: #f5f7fb;
  --muted: #b9c4d8;
  --line: rgba(255,255,255,.14);
  --accent: #ffcc4d;
  --ok: #7ee787;
  --alert: #ffd166;
  --error: #ff8a8a;
}
* { box-sizing: border-box; }
html {
  min-height: 100%;
  -webkit-text-size-adjust: 100%;
}
body {
  margin: 0;
  min-height: 100%;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #07142a 0%, #0c1b36 100%);
  color: var(--text);
  overscroll-behavior-y: none;
}
.page {
  width: min(980px, 100%);
  margin: 0 auto;
  padding: 12px 12px calc(104px + env(safe-area-inset-bottom));
}
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 4px 6px;
}
.logo {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  object-fit: cover;
  flex: 0 0 auto;
}
h1 {
  font-size: 24px;
  line-height: 1.15;
  margin: 0;
  letter-spacing: .02em;
  white-space: nowrap;
}
.today {
  color: var(--muted);
  font-size: 16px;
  margin-top: 3px;
}
.auto-box, .memo-box, .section, .qr-box, .bottom-actions {
  background: rgba(16,31,61,.92);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 12px;
  margin: 10px 0;
  box-shadow: 0 8px 22px rgba(0,0,0,.18);
}
.auto-head {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: baseline;
  margin-bottom: 8px;
}
.auto-head h2, .section h2, .memo-box h2, .qr-box h2 {
  font-size: 20px;
  margin: 0;
}
.updated {
  font-size: 14px;
  color: var(--muted);
  white-space: nowrap;
}
.auto-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.auto-list li {
  border-top: 1px solid var(--line);
  padding: 10px 0;
  font-size: 17px;
  line-height: 1.5;
}
.auto-list li:first-child { border-top: 0; padding-top: 0; }
.auto-source {
  font-size: 20px;
  font-weight: 800;
  text-decoration: underline;
  text-underline-offset: 3px;
  color: var(--text);
}
.auto-message {
  display: inline;
  margin-left: 2px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 17px;
  font-weight: 500;
  color: #d7deee;
  letter-spacing: .01em;
}
.badge {
  display: inline-block;
  min-width: 48px;
  text-align: center;
  margin-right: 6px;
  padding: 3px 7px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 800;
}
.ok .badge { background: rgba(126,231,135,.18); color: var(--ok); }
.alert .badge { background: rgba(255,209,102,.18); color: var(--alert); }
.error .badge { background: rgba(255,138,138,.18); color: var(--error); }
.link-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 7px;
  margin-top: 8px;
}
.link-row {
  min-height: 46px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(255,255,255,.045);
  color: var(--text);
  text-decoration: none;
  font-size: 19px;
  line-height: 1.25;
  font-weight: 650;
}
.link-row span {
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
}
.link-error {
  color: var(--error);
  font-size: 16px;
  line-height: 1.5;
  margin-top: 8px;
}
textarea {
  width: 100%;
  min-height: 88px;
  resize: vertical;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.22);
  color: var(--text);
  padding: 10px;
  font-size: 18px;
  margin-top: 8px;
}
button, .action-link {
  display: block;
  width: 100%;
  border: 0;
  border-radius: 12px;
  padding: 12px;
  font-weight: 800;
  background: var(--panel2);
  color: var(--text);
  margin-top: 8px;
  text-align: center;
  text-decoration: none;
  font-size: 17px;
}
.qr-wrap {
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 12px;
  align-items: center;
  margin-top: 10px;
}
.qr-wrap img {
  width: 112px;
  height: 112px;
  border-radius: 10px;
  background: white;
  padding: 6px;
}
.qr-text {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.45;
  word-break: break-all;
}
.bottom-nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 9999;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  padding-bottom: env(safe-area-inset-bottom);
  background: rgba(0,0,0,.5);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--line);
  transform: translateZ(0);
  will-change: transform;
}
.bottom-nav a {
  color: var(--text);
  text-decoration: none;
  text-align: center;
  padding: 11px 4px 13px;
  font-size: 15px;
  background: rgba(16,31,61,.92);
  -webkit-tap-highlight-color: transparent;
}
footer {
  color: var(--muted);
  font-size: 14px;
  text-align: center;
  line-height: 1.55;
  padding: 18px 0 0;
}
@media (min-width: 720px) {
  .link-list { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 420px) {
  h1 {
    font-size: 23px;
    white-space: normal;
  }
  .auto-source {
    font-size: 19px;
  }
  .auto-message {
    font-size: 16px;
  }
  .link-row {
    font-size: 18px;
  }
}
</style>
</head>
<body data-base-prefix="../">
  <main class="page">
    <header>
      <img class="logo" src="../assets/tsubame-icon-192.png" alt="">
      <div>
        <h1>広島市タクシーダッシュボード</h1>
        <div id="today" class="today">今日の日付を読み込み中</div>
      </div>
    </header>

    
<section class="auto-box">
  <div class="auto-head">
    <h2>本日の自動巡回メモ</h2>
    <div id="autoUpdated" class="updated">読み込み中</div>
  </div>
  <ul id="autoList" class="auto-list">
    <li><span class="badge">確認中</span>巡回データを読み込んでいます。</li>
  </ul>
</section>


    <div id="linksRoot">
      <section class="section">
        <h2>リンク集</h2>
        <div class="link-error">リンク集を読み込んでいます。</div>
      </section>
    </div>

    <section id="memo" class="memo-box">
      <h2>今日のメモ</h2>
      <textarea id="memo" placeholder="気になった道路、イベント、注意点など"></textarea>
      <button id="copyMemo" type="button">メモをコピー</button>
    </section>

    <section class="bottom-actions">
      <a class="action-link" href="../">手動リンク版を開く</a>
    </section>

    <section class="qr-box">
      <h2>共有用QRコード</h2>
      <div class="qr-wrap">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https%3A%2F%2Ftoyoji-afk.github.io%2Fhiroshima-taxi-dashboard%2Fauto%2F" alt="共有用QRコード">
        <div class="qr-text">
          同僚に共有するときは、このQRコードを読み取ってもらってください。<br>
          https://toyoji-afk.github.io/hiroshima-taxi-dashboard/auto/
        </div>
      </div>
    </section>

    <footer>
      第61版：status.json読込URL強化版<br>
      非公式・個人用ダッシュボード / © 2026 Toyoji Yamamoto
    </footer>
  </main>

  <nav class="bottom-nav" aria-label="主要メニュー">
    <a href="#road">道路</a>
    <a href="#railbus">鉄道</a>
    <a href="#airport">空港</a>
    <a href="#events">イベント</a>
  </nav>

  <script>

const pad = n => String(n).padStart(2, "0");
const weekdays = ["日","月","火","水","木","金","土"];

function getTodayInfo() {
  const now = new Date();
  return {
    now,
    key: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,
    text: `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${weekdays[now.getDay()]}）`
  };
}

function updateTodayDisplay() {
  const today = getTodayInfo();
  const todayEl = document.getElementById("today");
  if (todayEl) todayEl.textContent = today.text;
  return today;
}

const todayInfo = updateTodayDisplay();
const memoKey = `hiroshimaTaxiDash:memo:${todayInfo.key}`;
const memo = document.getElementById("memo");
if (memo) {
  memo.value = localStorage.getItem(memoKey) || "";
  memo.addEventListener("input", () => localStorage.setItem(memoKey, memo.value));
}

const copyMemo = document.getElementById("copyMemo");
if (copyMemo && memo) {
  copyMemo.addEventListener("click", async () => {
    const text = memo.value.trim();
    if (!text) {
      alert("メモ欄が空です。");
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
      alert("メモをコピーしました。");
    } catch (e) {
      alert("コピーできませんでした。メモを長押しして選択コピーしてください。");
    }
  });
}

function escapeHtml(str) {
  return String(str).replace(/[&<>'"]/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
  }[c]));
}
function escapeAttr(str) {
  return escapeHtml(str).replace(/`/g, "&#96;");
}

async function loadLinks() {
  const linksRoot = document.getElementById("linksRoot");
  if (!linksRoot) return;

  const prefix = document.body.dataset.basePrefix || "";
  const urls = [
    `${prefix}data/links.json?v=${Date.now()}`,
    `https://raw.githubusercontent.com/toyoji-afk/hiroshima-taxi-dashboard/main/data/links.json?v=${Date.now()}`
  ];

  let data = null;
  let lastError = null;

  for (const url of urls) {
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
      break;
    } catch (e) {
      lastError = e;
    }
  }

  if (!Array.isArray(data)) {
    linksRoot.innerHTML = `<section class="section"><h2>リンク集</h2><div class="link-error">リンク集を読み込めませんでした。data/links.json を確認してください。</div></section>`;
    console.error(lastError);
    return;
  }

  linksRoot.innerHTML = data.map(category => {
    const id = escapeAttr(category.id || "");
    const title = escapeHtml(category.category || "リンク");
    const links = Array.isArray(category.links) ? category.links : [];

    const rows = links.map(link => {
      const linkTitle = escapeHtml(link.title || "リンク");
      const url = escapeAttr(link.url || "#");
      return `<a class="link-row" href="${url}">${linkTitle}<span>開く</span></a>`;
    }).join("");

    return `
      <section id="${id}" class="section">
        <h2>${title}</h2>
        <div class="link-list">${rows}</div>
      </section>
    `;
  }).join("");
}

loadLinks();


async function loadAutoSummary() {
  const autoList = document.getElementById("autoList");
  const autoUpdated = document.getElementById("autoUpdated");
  if (!autoList || !autoUpdated) return;

  const pick = (item, keys, fallback = "") => {
    for (const key of keys) {
      if (item && item[key] !== undefined && item[key] !== null && String(item[key]).trim() !== "") {
        return String(item[key]);
      }
    }
    return fallback;
  };

  const judgeItem = (item) => {
    const raw = [
      item.level,
      item.status,
      item.state,
      item.badge,
      item.result,
      item.ok === false ? "not-ok" : "",
      item.alert === true ? "alert" : "",
      item.error === true ? "error" : ""
    ].filter(v => v !== undefined && v !== null).join(" ");

    const label = pick(item, ["label", "title", "name", "source"], "情報源");
    const message = pick(item, ["message", "text", "detail", "summary", "memo", "description"], "確認してください");
    const haystack = `${raw} ${label} ${message}`;

    const errorWords = ["error", "未取得", "取得失敗", "読み込めません", "not found", "status.json not found"];
    if (errorWords.some(w => haystack.includes(w))) {
      return { cls: "error", badge: "未取得" };
    }

    // 天気はタクシー乗務目線で判定する。
    // 降水確率が50%以上なら、配車増・乗降時の注意が必要なので「注意」。
    if (label.includes("天気")) {
      const rainPercentMatches = [...haystack.matchAll(/(\d{1,3})\s*%/g)]
        .map(m => Number(m[1]))
        .filter(n => Number.isFinite(n));
      const maxRainPercent = rainPercentMatches.length ? Math.max(...rainPercentMatches) : 0;
      if (maxRainPercent >= 50) {
        return { cls: "alert", badge: "注意" };
      }
    }

    const normalWords = [
      "平常運転",
      "平常・大きな乱れ情報なし",
      "大きな乱れ情報なし",
      "大きな欠航・遅延表示なし",
      "表示なし",
      "検出なし",
      "本拠地開催は検出なし",
      "通常運行",
      "通常通り"
    ];
    if (normalWords.some(w => haystack.includes(w))) {
      return { cls: "ok", badge: "OK" };
    }

    const explicitRawAlert = ["alert", "warning", "注意", "要確認", "not-ok"];
    if (explicitRawAlert.some(w => raw.includes(w))) {
      return { cls: "alert", badge: "注意" };
    }

    const transportAlertWords = [
      "運休", "遅延", "見合わせ", "運転見合わせ", "一部列車運休",
      "通行止", "規制", "事故", "渋滞", "欠航", "条件付き", "引き返し"
    ];
    if (transportAlertWords.some(w => haystack.includes(w))) {
      return { cls: "alert", badge: "注意" };
    }

    return { cls: "ok", badge: "OK" };
  };

  try {
    const cacheBust = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const pathParts = location.pathname.split("/").filter(Boolean);
    const repoName = pathParts[0] || "hiroshima-taxi-dashboard";
    const userName = location.hostname.replace(".github.io", "");

    // iPhoneのホーム画面アイコン経由では、/auto と /auto/ の扱いで
    // 相対パス data/status.json が外れることがあるため、候補URLを順番に試す。
    const statusUrls = [
      `./data/status.json?_=${cacheBust}`,
      `/hiroshima-taxi-dashboard/auto/data/status.json?_=${cacheBust}`,
      `/${repoName}/auto/data/status.json?_=${cacheBust}`,
      `https://raw.githubusercontent.com/${userName}/${repoName}/main/auto/data/status.json?_=${cacheBust}`
    ];

    let data = null;
    let lastStatusError = null;

    for (const statusUrl of statusUrls) {
      try {
        const res = await fetch(statusUrl, {
          cache: "no-store",
          headers: { "Cache-Control": "no-cache", "Pragma": "no-cache" }
        });
        if (!res.ok) throw new Error(`${statusUrl} HTTP ${res.status}`);
        data = await res.json();
        break;
      } catch (err) {
        lastStatusError = err;
        console.warn("status.json fetch failed:", err);
      }
    }

    if (!data) {
      throw lastStatusError || new Error("status.json not found");
    }
    const updated = data.updatedAtJst || data.updatedAt || data.generatedAt || "更新時刻不明";
    autoUpdated.textContent = "更新: " + updated;

    const items = Array.isArray(data.items)
      ? data.items
      : Array.isArray(data.results)
        ? data.results
        : Array.isArray(data.statuses)
          ? data.statuses
          : [];

    if (!items.length) {
      autoList.innerHTML = "<li class='error'><span class='badge'>未取得</span>巡回結果が空です。Actionsを確認してください。</li>";
      return;
    }

    autoList.innerHTML = items.map(item => {
      const judged = judgeItem(item);
      const label = escapeHtml(pick(item, ["label", "title", "name", "source"], "情報源"));
      const message = escapeHtml(pick(item, ["message", "text", "detail", "summary", "memo", "description"], "確認してください"))
        .replace(/要確認キーワードあり/g, "要確認あり")
        .replace(/キーワードあり/g, "あり");
      const url = pick(item, ["url", "link", "href", "source_url"], "");
      const sourceHtml = url
        ? `<a class="auto-source" href="${escapeAttr(url)}">${label}</a>`
        : `<span class="auto-source">${label}</span>`;
      return `<li class="${judged.cls}"><span class="badge">${judged.badge}</span>${sourceHtml}<span class="auto-message">：${message}</span></li>`;
    }).join("");
  } catch (e) {
    autoUpdated.textContent = "未取得";
    autoList.innerHTML = "<li class='error'><span class='badge'>未取得</span>巡回データを読み込めません。公式リンクで確認してください。</li>";
  }
}

loadAutoSummary();

let lastAutoRefreshAt = 0;
async function refreshAutoDashboard(reason = "manual") {
  const now = Date.now();
  // pageshow と visibilitychange が連続で来る場合があるため、短時間の二重実行を抑える。
  if (now - lastAutoRefreshAt < 1500) return;
  lastAutoRefreshAt = now;
  updateTodayDisplay();
  await loadAutoSummary();
}

// iPhoneのホーム画面アイコンやChrome/Safariの復帰時に、古いstatus.jsonを表示し続けない。
window.addEventListener("pageshow", () => refreshAutoDashboard("pageshow"));
window.addEventListener("focus", () => refreshAutoDashboard("focus"));
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) refreshAutoDashboard("visible");
});

  </script>
</body>
</html>
