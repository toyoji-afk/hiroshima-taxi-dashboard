<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>広島市タクシーダッシュボード</title>
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
:root {
  color-scheme: dark;
  --bg: #07142a;
  --panel: #101f3d;
  --panel2: #13264b;
  --text: #f5f7fb;
  --muted: #b9c4d8;
  --line: rgba(255,255,255,.14);
  --accent: #ffcc4d;
  --ok: #7ee787;
  --alert: #ffd166;
  --error: #ff8a8a;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #07142a 0%, #0c1b36 100%);
  color: var(--text);
}
.page {
  width: min(980px, 100%);
  margin: 0 auto;
  padding: 12px 12px 74px;
}
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 4px 6px;
}
.logo {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  object-fit: cover;
  flex: 0 0 auto;
}
h1 {
  font-size: 24px;
  line-height: 1.15;
  margin: 0;
  letter-spacing: .02em;
  white-space: nowrap;
}
.today {
  color: var(--muted);
  font-size: 16px;
  margin-top: 3px;
}
.auto-box, .memo-box, .section, .qr-box, .bottom-actions {
  background: rgba(16,31,61,.92);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 12px;
  margin: 10px 0;
  box-shadow: 0 8px 22px rgba(0,0,0,.18);
}
.auto-head {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: baseline;
  margin-bottom: 8px;
}
.auto-head h2, .section h2, .memo-box h2, .qr-box h2 {
  font-size: 20px;
  margin: 0;
}
.updated {
  font-size: 14px;
  color: var(--muted);
  white-space: nowrap;
}
.auto-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.auto-list li {
  border-top: 1px solid var(--line);
  padding: 10px 0;
  font-size: 17px;
  line-height: 1.5;
}
.auto-list li:first-child { border-top: 0; padding-top: 0; }
.auto-source {
  font-size: 20px;
  font-weight: 800;
  text-decoration: underline;
  text-underline-offset: 3px;
  color: var(--text);
}
.auto-message {
  display: inline;
  margin-left: 2px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 17px;
  font-weight: 500;
  color: #d7deee;
  letter-spacing: .01em;
}
.badge {
  display: inline-block;
  min-width: 48px;
  text-align: center;
  margin-right: 6px;
  padding: 3px 7px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 800;
}
.ok .badge { background: rgba(126,231,135,.18); color: var(--ok); }
.alert .badge { background: rgba(255,209,102,.18); color: var(--alert); }
.error .badge { background: rgba(255,138,138,.18); color: var(--error); }
.link-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 7px;
  margin-top: 8px;
}
.link-row {
  min-height: 46px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(255,255,255,.045);
  color: var(--text);
  text-decoration: none;
  font-size: 19px;
  line-height: 1.25;
  font-weight: 650;
}
.link-row span {
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
}
.link-error {
  color: var(--error);
  font-size: 16px;
  line-height: 1.5;
  margin-top: 8px;
}
textarea {
  width: 100%;
  min-height: 88px;
  resize: vertical;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.22);
  color: var(--text);
  padding: 10px;
  font-size: 18px;
  margin-top: 8px;
}
button, .action-link {
  display: block;
  width: 100%;
  border: 0;
  border-radius: 12px;
  padding: 12px;
  font-weight: 800;
  background: var(--panel2);
  color: var(--text);
  margin-top: 8px;
  text-align: center;
  text-decoration: none;
  font-size: 17px;
}
.qr-wrap {
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 12px;
  align-items: center;
  margin-top: 10px;
}
.qr-wrap img {
  width: 112px;
  height: 112px;
  border-radius: 10px;
  background: white;
  padding: 6px;
}
.qr-text {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.45;
  word-break: break-all;
}
.bottom-nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--line);
}
.bottom-nav a {
  color: var(--text);
  text-decoration: none;
  text-align: center;
  padding: 11px 4px 13px;
  font-size: 15px;
  background: rgba(16,31,61,.92);
}
footer {
  color: var(--muted);
  font-size: 14px;
  text-align: center;
  line-height: 1.55;
  padding: 18px 0 0;
}
@media (min-width: 720px) {
  .link-list { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 420px) {
  h1 {
    font-size: 23px;
    white-space: normal;
  }
  .auto-source {
    font-size: 19px;
  }
  .auto-message {
    font-size: 16px;
  }
  .link-row {
    font-size: 18px;
  }
}
</style>
</head>
<body data-base-prefix="">
  <main class="page">
    <header>
      <img class="logo" src="assets/tsubame-icon-192.png" alt="">
      <div>
        <h1>広島市タクシーダッシュボード</h1>
        <div id="today" class="today">今日の日付を読み込み中</div>
      </div>
    </header>

    

    <div id="linksRoot">
      <section class="section">
        <h2>リンク集</h2>
        <div class="link-error">リンク集を読み込んでいます。</div>
      </section>
    </div>

    <section id="memo" class="memo-box">
      <h2>今日のメモ</h2>
      <textarea id="memo" placeholder="気になった道路、イベント、注意点など"></textarea>
      <button id="copyMemo" type="button">メモをコピー</button>
    </section>

    <section class="bottom-actions">
      <a class="action-link" href="auto/">自動巡回版を開く</a>
    </section>

    <section class="qr-box">
      <h2>共有用QRコード</h2>
      <div class="qr-wrap">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https%3A%2F%2Ftoyoji-afk.github.io%2Fhiroshima-taxi-dashboard%2F" alt="共有用QRコード">
        <div class="qr-text">
          同僚に共有するときは、このQRコードを読み取ってもらってください。<br>
          https://toyoji-afk.github.io/hiroshima-taxi-dashboard/
        </div>
      </div>
    </section>

    <footer>
      第29版：リンク集JSON分離版<br>
      非公式・個人用ダッシュボード / © 2026 Toyoji Yamamoto
    </footer>
  </main>

  <nav class="bottom-nav" aria-label="主要メニュー">
    <a href="#road">道路</a>
    <a href="#railbus">鉄道</a>
    <a href="#airport">空港</a>
    <a href="#events">イベント</a>
  </nav>

  <script>

const pad = n => String(n).padStart(2, "0");
const now = new Date();
const weekdays = ["日","月","火","水","木","金","土"];
const todayKey = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
document.getElementById("today").textContent =
  `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${weekdays[now.getDay()]}）`;

const memoKey = `hiroshimaTaxiDash:memo:${todayKey}`;
const memo = document.getElementById("memo");
if (memo) {
  memo.value = localStorage.getItem(memoKey) || "";
  memo.addEventListener("input", () => localStorage.setItem(memoKey, memo.value));
}

const copyMemo = document.getElementById("copyMemo");
if (copyMemo && memo) {
  copyMemo.addEventListener("click", async () => {
    const text = memo.value.trim();
    if (!text) {
      alert("メモ欄が空です。");
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
      alert("メモをコピーしました。");
    } catch (e) {
      alert("コピーできませんでした。メモを長押しして選択コピーしてください。");
    }
  });
}

function escapeHtml(str) {
  return String(str).replace(/[&<>'"]/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
  }[c]));
}
function escapeAttr(str) {
  return escapeHtml(str).replace(/`/g, "&#96;");
}

async function loadLinks() {
  const linksRoot = document.getElementById("linksRoot");
  if (!linksRoot) return;

  const prefix = document.body.dataset.basePrefix || "";
  const urls = [
    `${prefix}data/links.json?v=${Date.now()}`,
    `https://raw.githubusercontent.com/toyoji-afk/hiroshima-taxi-dashboard/main/data/links.json?v=${Date.now()}`
  ];

  let data = null;
  let lastError = null;

  for (const url of urls) {
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
      break;
    } catch (e) {
      lastError = e;
    }
  }

  if (!Array.isArray(data)) {
    linksRoot.innerHTML = `<section class="section"><h2>リンク集</h2><div class="link-error">リンク集を読み込めませんでした。data/links.json を確認してください。</div></section>`;
    console.error(lastError);
    return;
  }

  linksRoot.innerHTML = data.map(category => {
    const id = escapeAttr(category.id || "");
    const title = escapeHtml(category.category || "リンク");
    const links = Array.isArray(category.links) ? category.links : [];

    const rows = links.map(link => {
      const linkTitle = escapeHtml(link.title || "リンク");
      const url = escapeAttr(link.url || "#");
      return `<a class="link-row" href="${url}">${linkTitle}<span>開く</span></a>`;
    }).join("");

    return `
      <section id="${id}" class="section">
        <h2>${title}</h2>
        <div class="link-list">${rows}</div>
      </section>
    `;
  }).join("");
}

loadLinks();


  </script>
</body>
</html>
